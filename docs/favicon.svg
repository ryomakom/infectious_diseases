<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0369a1"/>

  <!-- Virus spikes: 6 at 60-degree intervals -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" fill="white">
    <!-- top -->
    <line x1="32" y1="19" x2="32" y2="11"/>
    <circle cx="32" cy="8.5" r="3.2"/>
    <!-- top-right -->
    <line x1="43.3" y1="25.5" x2="51" y2="21"/>
    <circle cx="53" cy="19.8" r="3.2"/>
    <!-- bottom-right -->
    <line x1="43.3" y1="38.5" x2="51" y2="43"/>
    <circle cx="53" cy="44.2" r="3.2"/>
    <!-- bottom -->
    <line x1="32" y1="45" x2="32" y2="53"/>
    <circle cx="32" cy="55.5" r="3.2"/>
    <!-- bottom-left -->
    <line x1="20.7" y1="38.5" x2="13" y2="43"/>
    <circle cx="11" cy="44.2" r="3.2"/>
    <!-- top-left -->
    <line x1="20.7" y1="25.5" x2="13" y2="21"/>
    <circle cx="11" cy="19.8" r="3.2"/>
  </g>

  <!-- Virus body -->
  <circle cx="32" cy="32" r="13" fill="white"/>

  <!-- Rising trend line -->
  <polyline points="7,50 20,38 34,43 55,16"
            stroke="#fbbf24" stroke-width="5"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
