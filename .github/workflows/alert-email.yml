name: アラートメール送信

on:
  workflow_run:
    workflows: ["Render R Markdown Workflows"]
    types: [completed]
  workflow_dispatch:

jobs:
  send-alerts:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}
          fetch-depth: 0

      - name: アラートメール送信
        env:
          RANKING_CSV_PATH: docs/results/ranking.csv
          SUBSCRIPTIONS_CSV_URL: ${{ vars.SUBSCRIPTIONS_CSV_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM: ${{ vars.SENDGRID_FROM }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: node scripts/send-alert-emails.mjs
